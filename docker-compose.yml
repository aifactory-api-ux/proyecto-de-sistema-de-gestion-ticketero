version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticket-backend
    ports:
      - "8001:8001"
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8001
      - DATABASE_URL=sqlite:///./tickets.db
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_WEBHOOK_URL=${TELEGRAM_WEBHOOK_URL}
      - DEBUG=${DEBUG:-false}
      - TZ=America/Argentina/Buenos_Aires
    env_file:
      - .env
    volumes:
      - tickets-db:/app
    depends_on:
      backend-start:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - ticket-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticket-frontend
    ports:
      - "20001:8080"
    environment:
      - FRONTEND_PORT=8080
      - API_URL=http://backend:8001
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080')"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ticket-network

  backend-start:
    image: alpine:latest
    container_name: ticket-backend-startup
    command: ["sh", "-c", "echo 'Startup check complete'"]
    healthcheck:
      test: ["CMD", "sh", "-c", "exit 0"]
      interval: 1s
      timeout: 2s
      retries: 1
    networks:
      - ticket-network

volumes:
  tickets-db:
    driver: local

networks:
  ticket-network:
    driver: bridge
